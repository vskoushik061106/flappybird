<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Flappy Bird — Custom Image & Sound</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a4d5f 0%, #1e6b5e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
      padding: 16px;
      margin: 0;
    }

    .game-container {
      background: #0f2b2c;
      border-radius: 48px;
      padding: 16px 20px 20px 20px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255,255,255,0.1);
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 28px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
      cursor: pointer;
      width: 100%;
      height: auto;
    }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .score-board {
      background: #000000aa;
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 4px black;
    }

    .score-board span {
      font-size: 1.7rem;
      font-weight: 800;
      color: #f9e45b;
      margin-left: 10px;
    }

    .highscore {
      background: #2c2e3ecc;
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: bold;
      color: #ffd966;
    }

    button {
      background: #2c3e2f;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      padding: 8px 18px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      font-family: inherit;
    }

    button:active {
      transform: scale(0.96);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .upload-label {
      background: #4a627a;
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: inline-block;
    }

    .upload-label:active {
      transform: scale(0.96);
    }

    input[type="file"] {
      display: none;
    }

    .sound-upload {
      background: #aa6f3c;
    }

    @media (max-width: 580px) {
      .info-panel {
        justify-content: center;
      }
      .score-board span {
        font-size: 1.3rem;
      }
      button, .upload-label {
        padding: 6px 14px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <canvas id="gameCanvas" width="500" height="700"></canvas>

    <div class="info-panel">
      <div class="score-board">🐤 SCORE <span id="currentScore">0</span></div>
      <div class="highscore">🏆 BEST <span id="highScoreVal">0</span></div>
      <div class="action-buttons">
        <label class="upload-label" id="uploadBtnLabel">📷 Upload Bird
          <input type="file" id="birdUpload" accept="image/*">
        </label>
        <label class="upload-label sound-upload" id="uploadSoundLabel">🎵 Upload Chirp
          <input type="file" id="soundUpload" accept="audio/*">
        </label>
        <button id="pauseResumeBtn">⏸️ Pause</button>
      </div>
    </div>
    <div style="display: flex; justify-content: center; margin-top: 12px; gap: 12px;">
      <button id="startGameBtn">🚀 START GAME</button>
      <button id="restartGameBtn">🔄 Restart</button>
    </div>
  </div>
</div>

<script>
  (function(){
    // ------------------- DOM elements ------------------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const currentScoreSpan = document.getElementById('currentScore');
    const highScoreSpan = document.getElementById('highScoreVal');
    const startBtn = document.getElementById('startGameBtn');
    const restartBtn = document.getElementById('restartGameBtn');
    const pauseResumeBtn = document.getElementById('pauseResumeBtn');
    const birdUploadInput = document.getElementById('birdUpload');
    const soundUploadInput = document.getElementById('soundUpload');

    // ------------------- Game constants -----------------
    const WIDTH = 500;
    const HEIGHT = 700;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // bird settings
    const BIRD_SIZE = 36;
    let customBirdLoaded = false;
    let birdImageElement = null;

    // default fallback bird drawing
    function drawDefaultBird(ctx, x, y, size, rotationRad=0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotationRad);
      ctx.shadowColor = "rgba(0,0,0,0.5)";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.ellipse(0, 0, size*0.45, size*0.4, 0, 0, Math.PI*2);
      ctx.fillStyle = "#FFA559";
      ctx.fill();
      ctx.fillStyle = "#E67E22";
      ctx.beginPath();
      ctx.ellipse(0, 0, size*0.4, size*0.35, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(size*0.2, -size*0.1, size*0.12, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#1f2c2e";
      ctx.beginPath();
      ctx.arc(size*0.22, -size*0.12, size*0.06, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(size*0.26, -size*0.16, size*0.02, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#D45A1A";
      ctx.beginPath();
      ctx.moveTo(size*0.32, -size*0.05);
      ctx.lineTo(size*0.52, -size*0.02);
      ctx.lineTo(size*0.32, size*0.03);
      ctx.fill();
      ctx.restore();
    }

    function setBirdImageFromFile(file) {
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          birdImageElement = img;
          customBirdLoaded = true;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    birdUploadInput.addEventListener('change', (e) => {
      if(e.target.files && e.target.files[0]) {
        setBirdImageFromFile(e.target.files[0]);
      }
    });

    // ------------------- Custom Chirp Sound ------------------
    let customChirpAudio = null;
    let customChirpURL = null;

    function playChirp() {
      if (customChirpAudio) {
        const clone = customChirpAudio.cloneNode();
        clone.play().catch(e => console.log("Audio play failed", e));
      } else {
        // default chirp (sine wave)
        if (!audioCtx) initAudio();
        if (audioCtx) {
          const now = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now+0.3);
          osc.frequency.setValueAtTime(880, now);
          osc.frequency.exponentialRampToValueAtTime(1400, now+0.15);
          osc.type = 'sine';
          osc.start();
          osc.stop(now+0.25);
        }
      }
    }

    soundUploadInput.addEventListener('change', (e) => {
      if(e.target.files && e.target.files[0]) {
        const file = e.target.files[0];
        if (customChirpURL) URL.revokeObjectURL(customChirpURL);
        customChirpURL = URL.createObjectURL(file);
        const audio = new Audio(customChirpURL);
        audio.preload = 'auto';
        customChirpAudio = audio;
      }
    });

    // ------------------- Game variables ------------------
    let gameState = "menu";       // menu, running, gameover, paused
    let score = 0;
    let highScore = 0;
    
    try {
      const saved = localStorage.getItem('flappyHighScore');
      if(saved && !isNaN(parseInt(saved))) highScore = parseInt(saved);
      highScoreSpan.innerText = highScore;
    } catch(e) {}

    function updateHighScoreUI() {
      highScoreSpan.innerText = highScore;
      if(score > highScore) {
        highScore = score;
        highScoreSpan.innerText = highScore;
        localStorage.setItem('flappyHighScore', highScore);
      }
    }
    
    let birdY = HEIGHT/2;
    let birdVelocity = 0;
    const GRAVITY = 0.22;
    const JUMP_FORCE = -5.2;
    
    let pipes = [];
    const PIPE_WIDTH = 58;
    const PIPE_GAP = 145;
    const PIPE_SPACING = 230;
    let baseSpeed = 2.2;
    let currentSpeed = baseSpeed;
    
    // Shorter pipes (reduced height)
    function generatePipe() {
      const minTopHeight = 75;
      const maxTopHeight = 260;
      const topHeight = Math.floor(Math.random() * (maxTopHeight - minTopHeight + 1) + minTopHeight);
      pipes.push({
        x: WIDTH,
        topHeight: topHeight,
        bottomY: topHeight + PIPE_GAP,
        counted: false
      });
    }
    
    function updateDifficulty() {
      let increment = Math.floor(score / 8);
      let newSpeed = baseSpeed + increment * 0.28;
      if(newSpeed > 6.2) newSpeed = 6.2;
      currentSpeed = newSpeed;
    }
    
    function resetGame() {
      score = 0;
      currentScoreSpan.innerText = "0";
      birdY = HEIGHT/2;
      birdVelocity = 0;
      pipes = [];
      currentSpeed = baseSpeed;
      for(let i=0; i<3; i++) {
        generatePipe();
        pipes[i].x = WIDTH + i * PIPE_SPACING;
      }
      gameState = "menu";
      updateHighScoreUI();
    }
    
    function checkCollisions() {
      if(birdY + BIRD_SIZE/2 >= HEIGHT - 20 || birdY - BIRD_SIZE/2 <= 20) {
        return true;
      }
      const birdLeft = WIDTH/2 - BIRD_SIZE/2;
      const birdRight = WIDTH/2 + BIRD_SIZE/2;
      const birdTop = birdY - BIRD_SIZE/2;
      const birdBottom = birdY + BIRD_SIZE/2;
      
      for(let pipe of pipes) {
        const pipeLeft = pipe.x;
        const pipeRight = pipe.x + PIPE_WIDTH;
        if(birdRight > pipeLeft && birdLeft < pipeRight) {
          if(birdTop < pipe.topHeight) return true;
          if(birdBottom > pipe.bottomY) return true;
        }
      }
      return false;
    }
    
    function updateGame() {
      if(gameState !== "running") return;
      
      birdVelocity += GRAVITY;
      birdY += birdVelocity;
      
      for(let i=0; i<pipes.length; i++) {
        pipes[i].x -= currentSpeed;
      }
      pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
      
      for(let pipe of pipes) {
        if(!pipe.counted && pipe.x + PIPE_WIDTH < WIDTH/2 - BIRD_SIZE/4) {
          pipe.counted = true;
          score++;
          currentScoreSpan.innerText = score;
          updateHighScoreUI();
          updateDifficulty();
          playScoreSound();
        }
      }
      
      if(pipes.length === 0 || pipes[pipes.length-1].x <= WIDTH - PIPE_SPACING) {
        generatePipe();
      }
      
      if(checkCollisions()) {
        gameState = "gameover";
        playHitSound();
        cancelAnimation();
      }
    }
    
    // ------------------- Drawing ------------------
    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      grad.addColorStop(0, "#b1e1ff");
      grad.addColorStop(1, "#eef9ff");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      ctx.fillStyle = "rgba(255,255,245,0.9)";
      ctx.beginPath();
      ctx.ellipse(80, 90, 45, 35, 0, 0, Math.PI*2);
      ctx.ellipse(130, 70, 50, 40, 0, 0, Math.PI*2);
      ctx.ellipse(170, 95, 40, 32, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,245,0.8)";
      ctx.beginPath();
      ctx.ellipse(380, 150, 55, 40, 0, 0, Math.PI*2);
      ctx.ellipse(430, 130, 45, 35, 0, 0, Math.PI*2);
      ctx.fill();
    }
    
    function drawPipes() {
      for(let pipe of pipes) {
        ctx.fillStyle = "#2d6a4f";
        ctx.shadowBlur = 4;
        ctx.shadowColor = "rgba(0,0,0,0.3)";
        ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
        ctx.fillStyle = "#40916c";
        ctx.fillRect(pipe.x-5, pipe.topHeight-32, PIPE_WIDTH+10, 32);
        ctx.fillStyle = "#1b4d2e";
        ctx.fillRect(pipe.x, pipe.topHeight-28, PIPE_WIDTH, 28);
        
        ctx.fillStyle = "#2d6a4f";
        ctx.fillRect(pipe.x, pipe.bottomY, PIPE_WIDTH, HEIGHT - pipe.bottomY);
        ctx.fillStyle = "#40916c";
        ctx.fillRect(pipe.x-5, pipe.bottomY, PIPE_WIDTH+10, 32);
        ctx.fillStyle = "#1b4d2e";
        ctx.fillRect(pipe.x, pipe.bottomY+4, PIPE_WIDTH, 28);
      }
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#8d6b3c";
      ctx.fillRect(0, HEIGHT-20, WIDTH, 20);
      ctx.fillStyle = "#c99e6a";
      ctx.fillRect(0, HEIGHT-23, WIDTH, 4);
    }
    
    function drawBird() {
      const birdCenterX = WIDTH/2;
      const birdCenterY = birdY;
      let rotation = Math.min(Math.max(birdVelocity * 0.12, -0.7), 0.9);
      
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.4)";
      ctx.shadowBlur = 12;
      if(customBirdLoaded && birdImageElement && birdImageElement.complete && birdImageElement.naturalWidth > 0) {
        const imgW = birdImageElement.naturalWidth;
        const imgH = birdImageElement.naturalHeight;
        const targetSize = BIRD_SIZE;
        let drawW, drawH;
        if(imgW > imgH) {
          drawW = targetSize;
          drawH = (imgH / imgW) * targetSize;
        } else {
          drawH = targetSize;
          drawW = (imgW / imgH) * targetSize;
        }
        ctx.translate(birdCenterX, birdCenterY);
        ctx.rotate(rotation);
        ctx.drawImage(birdImageElement, -drawW/2, -drawH/2, drawW, drawH);
      } else {
        drawDefaultBird(ctx, birdCenterX, birdCenterY, BIRD_SIZE, rotation);
      }
      ctx.restore();
      
      ctx.save();
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(birdCenterX, birdCenterY, BIRD_SIZE/2 + 3, 0, Math.PI*2);
      ctx.fillStyle = "rgba(255,240,160,0.2)";
      ctx.fill();
      ctx.restore();
    }
    
    function drawGameOverlay() {
      if(gameState === "menu") {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.font = "bold 34px 'Segoe UI'";
        ctx.fillStyle = "#f7e05e";
        ctx.fillText("FLAPPY BIRD", WIDTH/2-130, 170);
        ctx.font = "22px system-ui";
        ctx.fillStyle = "white";
        ctx.fillText("⬆️ Tap / Space / Click", WIDTH/2-150, 260);
        ctx.fillText("📸 Upload your own bird!", WIDTH/2-145, 320);
        ctx.fillStyle = "#c7f9cc";
        ctx.font = "18px monospace";
        ctx.fillText("Press [START GAME]", WIDTH/2-95, 430);
      } 
      else if(gameState === "gameover") {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.font = "bold 44px system-ui";
        ctx.fillStyle = "#ffb347";
        ctx.fillText("GAME OVER", WIDTH/2-120, 250);
        ctx.font = "28px system-ui";
        ctx.fillStyle = "white";
        ctx.fillText("Score: "+score, WIDTH/2-70, 340);
        ctx.font = "20px system-ui";
        ctx.fillStyle = "#eee";
        ctx.fillText("Click Restart or Start", WIDTH/2-120, 450);
      } 
      else if(gameState === "paused") {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.font = "bold 44px system-ui";
        ctx.fillStyle = "#cfe9df";
        ctx.fillText("⏸ PAUSED", WIDTH/2-100, HEIGHT/2);
        ctx.font = "18px system-ui";
        ctx.fillStyle = "#ddd";
        ctx.fillText("Press [Resume] or Tap", WIDTH/2-110, HEIGHT/2+70);
      }
    }
    
    // ------------------- Sound effects (score, hit) ------------------
    let audioCtx = null;
    function initAudio() {
      if(!audioCtx && window.AudioContext) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function playScoreSound() {
      if(!audioCtx) initAudio();
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now+0.3);
      osc.frequency.value = 1200;
      osc.type = 'triangle';
      osc.start();
      osc.stop(now+0.2);
    }
    
    function playHitSound() {
      if(!audioCtx) initAudio();
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now+0.4);
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      osc.start();
      osc.stop(now+0.3);
    }
    
    // ------------------- Jump with chirp ------------------
    function performJump() {
      if(gameState === "running") {
        birdVelocity = JUMP_FORCE;
        playChirp();
      }
    }
    
    // ------------------- Game flow ------------------
    function startGameSession() {
      resetGame();
      gameState = "running";
      currentSpeed = baseSpeed;
      pipes = [];
      for(let i=0; i<3; i++) generatePipe();
      pipes.forEach((p, idx) => { p.x = WIDTH + idx * PIPE_SPACING; });
      birdY = HEIGHT/2;
      birdVelocity = 0;
      score = 0;
      currentScoreSpan.innerText = "0";
      updateHighScoreUI();
      cancelAnimation();
      startAnimation();
    }
    
    function restartGameSession() {
      startGameSession();
    }
    
    function pauseGame() {
      if(gameState === "running") {
        gameState = "paused";
        pauseResumeBtn.innerHTML = "▶️ Resume";
        cancelAnimation();
      } else if(gameState === "paused") {
        gameState = "running";
        pauseResumeBtn.innerHTML = "⏸️ Pause";
        startAnimation();
      }
    }
    
    let animFrameId = null;
    function gameLoop() {
      if(gameState === "running") {
        updateGame();
      }
      drawFrame();
      animFrameId = requestAnimationFrame(gameLoop);
    }
    
    function drawFrame() {
      drawBackground();
      drawPipes();
      drawBird();
      drawGameOverlay();
      if(gameState === "running" || gameState === "paused") {
        ctx.font = "bold 32px 'Segoe UI'";
        ctx.fillStyle = "#1f3a3b";
        ctx.shadowBlur = 0;
        ctx.fillText(`${score}`, WIDTH/2-18, 70);
      }
    }
    
    function cancelAnimation() {
      if(animFrameId) {
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
      }
    }
    
    function startAnimation() {
      if(!animFrameId) {
        animFrameId = requestAnimationFrame(gameLoop);
      }
    }
    
    // Event listeners
    canvas.addEventListener('click', (e) => {
      e.stopPropagation();
      if(gameState === "running") performJump();
    });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if(gameState === "running") performJump();
    });
    
    window.addEventListener('keydown', (e) => {
      if(e.code === 'Space') {
        e.preventDefault();
        if(gameState === "running") performJump();
        else if(gameState === "gameover") restartGameSession();
        else if(gameState === "menu") startGameSession();
      }
    });
    
    startBtn.addEventListener('click', () => {
      if(gameState === "running") return;
      startGameSession();
    });
    restartBtn.addEventListener('click', () => {
      restartGameSession();
    });
    pauseResumeBtn.addEventListener('click', () => {
      if(gameState === "running") pauseGame();
      else if(gameState === "paused") pauseGame();
    });
    
    resetGame();
    gameState = "menu";
    startAnimation();
    initAudio();
  })();
</script>
</body>
</html>
